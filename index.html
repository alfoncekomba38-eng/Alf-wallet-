<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Exchange PRO</title>

<script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff;color:#111}

.top{
padding:15px;
background:#111;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{padding:10px}

.box{
background:#f3f3f3;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.btn{
padding:10px;
background:#ddd;
margin-top:8px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>

<div class="top">
<div>💎 ALF Exchange</div>
<div id="addr">Not Connected</div>
</div>

<div class="container">

<div class="box">
<h3>Wallet</h3>
<div class="btn" onclick="connect()">Connect Wallet</div>
<h4>Balance: <span id="bal">0</span> ALF</h4>
</div>

<div class="box">
<h3>🔁 Swap (Demo)</h3>
<input id="swapAmt" placeholder="Amount ALF">
<div class="btn" onclick="swap()">Swap ALF ↔ BNB</div>
</div>

<div class="box">
<h3>📊 Order Book</h3>

<input id="price" placeholder="Price">
<input id="amount" placeholder="Amount">

<div class="btn" onclick="addOrder('BUY')">Buy Order</div>
<div class="btn" onclick="addOrder('SELL')">Sell Order</div>

<table>
<tr>
<th>Type</th>
<th>Price</th>
<th>Amount</th>
</tr>
<tbody id="orders"></tbody>
</table>

</div>

</div>

<script>

// =======================
// SAFETY CHECK
// =======================
if(typeof ethers === "undefined"){
alert("Ethers haijaload");
throw new Error("ethers missing");
}

// ===== TOKEN (BEP20) =====
const TOKEN = "0xD42B0217bb40E53800384f624b62Dd7F8465d766";

// ===== GLOBALS =====
let provider, signer, user, contract;

// ===== ERC20 ABI =====
const abi = [
"function balanceOf(address) view returns(uint256)",
"function decimals() view returns(uint8)",
"function symbol() view returns(string)",
"function name() view returns(string)"
];

console.log("ALF Exchange FULL READY ✔");

// =======================
// NETWORK SWITCH
// =======================
async function switchToBNB(){
try{
await window.ethereum.request({
method:"wallet_switchEthereumChain",
params:[{ chainId:"0x38" }]
});
}catch(e){
if(e.code === 4902){
await window.ethereum.request({
method:"wallet_addEthereumChain",
params:[{
chainId:"0x38",
chainName:"BNB Smart Chain",
rpcUrls:["https://bsc-dataseed.binance.org/"],
nativeCurrency:{
name:"BNB",
symbol:"BNB",
decimals:18
},
blockExplorerUrls:["https://bscscan.com"]
}]
});
}
}
}

// =======================
// CONNECT WALLET
// =======================
async function connect(){
try{

if(!window.ethereum){
alert("Install MetaMask");
return;
}

const accounts = await window.ethereum.request({
method:"eth_requestAccounts"
});

user = accounts[0];

await switchToBNB();

provider = new ethers.providers.Web3Provider(window.ethereum);
signer = provider.getSigner();

contract = new ethers.Contract(TOKEN, abi, signer);

document.getElementById("addr").innerText =
user.slice(0,6)+"..."+user.slice(-4);

// TOKEN CHECK
try{
const symbol = await contract.symbol();
console.log("TOKEN:", symbol);
}catch(e){
alert("Invalid BEP20 contract");
}

await loadBalance();

alert("Connected ✔");

}catch(e){
console.log(e);
alert(e.message);
}
}

// =======================
// REAL BALANCE SAFE
// =======================
async function loadBalance(){
try{

if(!contract) return;

const bal = await contract.balanceOf(user);

let decimals = 18;

try{
decimals = await contract.decimals();
}catch(e){}

const formatted = ethers.utils.formatUnits(bal, decimals);

document.getElementById("bal").innerText =
parseFloat(formatted).toLocaleString();

}catch(e){
console.log("Balance error:", e);
document.getElementById("bal").innerText = "0";
}
}

// =======================
// SWAP DEMO
// =======================
function swap(){
alert("Swap bado demo 🔁 (next step: real PancakeSwap)");
}

// =======================
// ORDER BOOK UI
// =======================
function addOrder(type){

let price = document.getElementById("price").value;
let amount = document.getElementById("amount").value;

if(!price || !amount){
alert("Fill all fields");
return;
}

document.getElementById("orders").innerHTML += `
<tr>
<td>${type}</td>
<td>${price}</td>
<td>${amount}</td>
</tr>
`;
}

// =======================
// AUTO CONNECT
// =======================
window.onload = async () => {
if(window.ethereum){
const acc = await window.ethereum.request({
method:"eth_accounts"
});

if(acc.length > 0){
connect();
}
}
};

</script>

</body>
</html>
