<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Full Exchange</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff;color:#111}

.top{
padding:15px;
background:#111;
color:#fff;
display:flex;
justify-content:space-between;
}

.container{padding:10px}

.box{
background:#f3f3f3;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.btn{
padding:10px;
background:#ddd;
margin-top:8px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>

<div class="top">
<div>💎 ALF Exchange</div>
<div id="addr">Not Connected</div>
</div>

<div class="container">

<!-- WALLET -->
<div class="box">
<h3>Wallet</h3>
<div class="btn" onclick="connect()">Connect Wallet</div>
</div>

<!-- SWAP -->
<div class="box">
<h3>🔁 Swap (AMM)</h3>
<input id="swapAmt" placeholder="Amount ALF">
<div class="btn" onclick="swap()">Swap ALF ↔ BNB</div>
</div>

<!-- ORDER BOOK -->
<div class="box">
<h3>📊 Order Book</h3>

<input id="price" placeholder="Price">
<input id="amount" placeholder="Amount">

<div class="grid">
<div class="btn" onclick="createOrder(true)">Buy</div>
<div class="btn" onclick="createOrder(false)">Sell</div>
</div>

<table>
<tr>
<th>Type</th>
<th>Price</th>
<th>Amount</th>
</tr>

<tbody id="orders"></tbody>
</table>

</div>

<!-- BALANCE -->
<div class="box">
<h3>💰 ALF Balance</h3>
<div id="bal">0</div>
</div>

</div>

<script>

const TOKEN="0xD42B0217bb40E53800384f624b62Dd7F8465d766";

let provider,signer,user;

let orderList=[];

async function connect(){
provider=new ethers.BrowserProvider(window.ethereum);
await provider.send("eth_requestAccounts",[]);
signer=await provider.getSigner();
user=await signer.getAddress();

document.getElementById("addr").innerText=
user.slice(0,6)+"..."+user.slice(-4);
}

function swap(){
alert("Swap executed (connect PancakeSwap router for real trading)");
}

function createOrder(isBuy){

let p=document.getElementById("price").value;
let a=document.getElementById("amount").value;

orderList.push({
type:isBuy?"BUY":"SELL",
price:p,
amount:a
});

render();
}

function render(){

let html="";

orderList.forEach(o=>{
html+=`
<tr>
<td>${o.type}</td>
<td>${o.price}</td>
<td>${o.amount}</td>
</tr>
`;
});

document.getElementById("orders").innerHTML=html;
}

</script>

</body>
</html>
