<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet Pro</title>

<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.card{
  background:#151c2c;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4f6ef7;
  color:white;
  margin-top:8px;
}

.big{font-size:26px;color:#16c784;font-weight:bold;}
input{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:none;
}
.small{font-size:12px;color:#aaa;}
</style>
</head>

<body>

<div class="card">
  <h2>ALF Wallet 🚀 Mining + Staking</h2>
  <button onclick="connectWallet()">Connect Wallet</button>
  <p class="small" id="addr">Not connected</p>
</div>

<!-- BALANCES -->
<div class="card">
  <h3>💰 ALF Balance</h3>
  <div class="big" id="alf">0</div>
</div>

<!-- MINING -->
<div class="card">
  <h3>⛏️ Mining System</h3>
  <div>Rate: <b>0.5 ALF / hour</b></div>
  <div class="small">Click start to mine every hour</div>
  <button onclick="startMining()">Start Mining</button>
  <button onclick="claimMining()">Claim Rewards</button>
  <div class="small" id="mineStatus">Not mining</div>
</div>

<!-- STAKING -->
<div class="card">
  <h3>📈 Staking System</h3>
  <input id="stakeAmt" placeholder="Amount to stake">
  <button onclick="stake()">Stake ALF</button>
  <button onclick="unstake()">Unstake + Rewards</button>
  <div class="small" id="stakeInfo">No active stake</div>
</div>

<script>

let user;

// fake balances (frontend simulation)
let alfBalance = 0;
let miningReward = 0;
let staked = 0;
let stakeStart = 0;
let miningActive = false;

// CONNECT
async function connectWallet(){
  if(!window.ethereum) return alert("Install MetaMask");

  let acc = await ethereum.request({method:"eth_requestAccounts"});
  user = acc[0];

  document.getElementById("addr").innerText = user;

  loadData();
}

// LOAD
function loadData(){
  document.getElementById("alf").innerText = alfBalance.toFixed(2);
}

// ⛏️ MINING
function startMining(){
  miningActive = true;
  document.getElementById("mineStatus").innerText = "Mining started... ⛏️";

  setInterval(()=>{
    if(miningActive){
      miningReward += 0.5; // per hour simulation
      document.getElementById("mineStatus").innerText =
      "Mining... Reward: " + miningReward.toFixed(2) + " ALF";
    }
  }, 3600000); // 1 hour real-time
}

// CLAIM MINING
function claimMining(){
  alfBalance += miningReward;
  miningReward = 0;
  loadData();
  alert("Mining claimed!");
}

// 📈 STAKE
function stake(){
  let amt = Number(document.getElementById("stakeAmt").value);

  if(amt <= 0 || amt > alfBalance){
    return alert("Invalid amount");
  }

  alfBalance -= amt;
  staked += amt;
  stakeStart = Date.now();

  document.getElementById("stakeInfo").innerText =
  "Staked: " + staked + " ALF";
  loadData();
}

// UNSTAKE + REWARD
function unstake(){
  if(staked <= 0) return alert("No stake");

  let days = (Date.now() - stakeStart) / (1000*60*60*24);

  let reward = staked * 0.05 * days; // 5% daily APR

  alfBalance += staked + reward;

  alert("Unstaked + Reward: " + reward.toFixed(2) + " ALF");

  staked = 0;
  document.getElementById("stakeInfo").innerText = "No active stake";

  loadData();
}

</script>

</body>
</html>
