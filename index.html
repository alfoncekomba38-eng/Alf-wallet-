<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1115;
  color:#fff;
}
.container{padding:15px;}
.card{
  background:#1a1f2b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}
.balance{
  font-size:28px;
  font-weight:bold;
}
.small{font-size:12px;color:#aaa;}
.green{color:#0ad1a8;}
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#4f6ef7;
  color:#fff;
}
.row{
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h3>🔗 Wallet</h3>
  <div>paskalimhaiki2@gmail.com</div>
  <div class="small green">Connected</div>
</div>

<div class="card">
  <h3>💰 ALF Balance</h3>
  <div class="balance" id="balance">110.04 ALF</div>
</div>

<div class="card">
  <h3>⛏️ Mining</h3>
  <div>Status: <span id="status">Not mining</span></div>
  <button onclick="startMining()">Start</button>
  <button onclick="claim()">Claim</button>
</div>

<div class="card">
  <h3>📈 Staking</h3>
  <div class="row"><div>Staked</div><div id="staked">0</div></div>
  <div class="row"><div>Reward</div><div id="reward">0</div></div>
  <button onclick="stake()">Stake</button>
</div>

<div class="card">
  <h3>🎁 Referral</h3>
  <div>Code: ALF-72167</div>
  <button onclick="invite()">Invite (+50)</button>
</div>

</div>

<script>
let balance = 110.04;
let staked = 0;
let reward = 0;

function update(){
  document.getElementById("balance").innerText = balance.toFixed(2)+" ALF";
  document.getElementById("staked").innerText = staked;
  document.getElementById("reward").innerText = reward.toFixed(4);
}

function startMining(){
  document.getElementById("status").innerText = "Mining...";
}

function claim(){
  balance += 0.5;
  update();
  alert("0.5 ALF added");
}

function stake(){
  if(balance >= 10){
    balance -= 10;
    staked += 10;
    update();
  }
}

function invite(){
  balance += 50;
  update();
}

setInterval(()=>{
  if(staked > 0){
    reward += staked * 0.00005;
    update();
  }
},1000);

update();
</script>

</body>
</html>
