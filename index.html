<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1115;
  color:#fff;
}

.container{padding:15px;}

.card{
  background:#1a1f2b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

h3{margin:5px 0;}

.balance{
  font-size:28px;
  font-weight:bold;
}

.small{font-size:12px;color:#aaa;}

.green{color:#0ad1a8;}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#4f6ef7;
  color:#fff;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="container">

<!-- WALLET -->
<div class="card">
  <h3>🔗 Wallet</h3>
  <div id="email">paskalimhaiki2@gmail.com</div>
  <div class="small green">Connected</div>
</div>

<!-- BALANCE -->
<div class="card">
  <h3>💰 ALF Balance</h3>
  <div class="balance" id="balance">110.04 ALF</div>
  <div class="small">Referral Bonus Included</div>
</div>

<!-- MINING -->
<div class="card">
  <h3>⛏️ 24H Mining</h3>
  <div class="small">Reward: 0.5 ALF / 24H</div>

  <div class="small">Status: <span id="status">Mining active ⛏️</span></div>
  <div class="small">Time Left: <span id="timer">23:52:14</span></div>

  <button onclick="startMining()">Start Mining</button>
  <button onclick="claim()">Claim Mining</button>
</div>

<!-- STAKING -->
<div class="card">
  <h3>📈 Staking</h3>

  <div class="row"><div>Staked</div><div id="staked">0.00</div></div>
  <div class="row"><div>Reward</div><div id="reward">0.0000</div></div>

  <button onclick="stake()">Stake</button>
</div>

<!-- REFERRAL -->
<div class="card">
  <h3>🎁 Referral</h3>
  <div class="small">Your Code:</div>
  <div class="green">ALF-72167</div>

  <button onclick="invite()">Invite Friend (+50 ALF)</button>
</div>

</div>

<script>
// DATA
let balance = 110.04;
let staked = 0;
let reward = 0;

// MINING
function startMining(){
  document.getElementById("status").innerText = "Mining active ⛏️";
}

function claim(){
  balance += 0.5;
  update();
  alert("0.5 ALF claimed");
}

// STAKE
function stake(){
  let amt = 10;

  if(balance >= amt){
    balance -= amt;
    staked += amt;
    update();
  }
}

// REFERRAL
function invite(){
  balance += 50;
  update();
}

// AUTO REWARD
setInterval(()=>{
  if(staked > 0){
    reward += staked * 0.00005;
  }

  document.getElementById("reward").innerText = reward.toFixed(4);
},1000);

// UPDATE
function update(){
  document.getElementById("balance").innerText = balance.toFixed(2)+" ALF";
  document.getElementById("staked").innerText = staked.toFixed(2);
}

update();
</script>

</body>
</html>
