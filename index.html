<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet Pro MAX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1115;
  color:#fff;
}

.container{padding:15px;}

.card{
  background:#1a1f2b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#4f6ef7;
  color:#fff;
  font-weight:bold;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

.small{font-size:12px;color:#aaa;}

.row{display:flex;justify-content:space-between;margin:6px 0;}

.green{color:#0ad1a8;}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h3>🔐 ALF Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login / Signup</button>
</div>

<!-- WALLET -->
<div class="card">
  <h3>Wallet</h3>
  <div class="small green" id="user">Not logged in</div>
</div>

<!-- BALANCE -->
<div class="card">
  <h3>💰 ALF Balance</h3>
  <h2><span id="balance">0.00</span> ALF</h2>
  <div class="small">Referral Bonus Included</div>
</div>

<!-- PRICES -->
<div class="card">
  <h3>📈 Live Prices</h3>
  <div class="row"><div>BNB</div><div id="bnb">loading...</div></div>
  <div class="row"><div>TRX</div><div id="trx">loading...</div></div>
  <div class="row"><div>BTC</div><div id="btc">loading...</div></div>
</div>

<!-- MINING -->
<div class="card">
  <h3>⛏️ 24H Mining</h3>
  <div class="small">Reward: 0.5 ALF / 24H</div>

  <div class="small">Status: <span id="mineStatus">Not mining</span></div>
  <div class="small">Time Left: <span id="timer">24:00:00</span></div>

  <button onclick="startMining()">Start Mining</button>
  <button onclick="claimMining()">Claim Mining</button>
</div>

<!-- STAKING -->
<div class="card">
  <h3>📈 Staking</h3>

  <div class="row"><div>Staked</div><div id="staked">0</div></div>
  <div class="row"><div>Reward</div><div id="reward">0</div></div>

  <input id="stakeInput" placeholder="Enter ALF">
  <button onclick="stake()">Stake</button>
  <button onclick="unstake()">Unstake</button>
  <button onclick="claimStake()">Claim</button>
</div>

<!-- REFERRAL -->
<div class="card">
  <h3>🎁 Referral System</h3>
  <div class="small">Your Code:</div>
  <div class="green" id="refCode"></div>
  <button onclick="invite()">Invite Friend (+50 ALF)</button>
</div>

</div>

<script>

// ================= FIREBASE (READY STRUCTURE) =================
// 👉 Add your Firebase config here
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

// NOTE: actual Firebase SDK not loaded (template ready)

// ================= USER SYSTEM =================
let user = localStorage.getItem("user") || "";
document.getElementById("user").innerText = user ? user : "Not logged in";

function login(){
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if(email && pass){
    user = email;
    localStorage.setItem("user", user);
    document.getElementById("user").innerText = user;
    document.getElementById("loginBox").style.display="none";

    generateReferral();
  }
}

// ================= BALANCE =================
let balance = parseFloat(localStorage.getItem("balance")) || 10;
let staked = 0;
let stakeReward = 0;

// ================= REFERRAL =================
let refCode = localStorage.getItem("ref") || "";

function generateReferral(){
  if(!refCode){
    refCode = "ALF-" + Math.floor(Math.random()*99999);
    localStorage.setItem("ref", refCode);
  }
  document.getElementById("refCode").innerText = refCode;
}

generateReferral();

function invite(){
  balance += 50;
  save();
  alert("Friend invited +50 ALF");
  update();
}

// ================= MINING 24H =================
let mining = false;
let timeLeft = parseInt(localStorage.getItem("mineTime")) || 86400;

function startMining(){
  mining = true;
  document.getElementById("mineStatus").innerText = "Mining active ⛏️";
}

function claimMining(){
  if(timeLeft <= 0){
    balance += 0.5;
    timeLeft = 86400;
    save();
    update();
    alert("Claimed 0.5 ALF");
  } else {
    alert("Wait 24H to finish mining");
  }
}

// ================= STAKING =================
function stake(){
  let amt = parseFloat(document.getElementById("stakeInput").value);

  if(amt > 0 && amt <= balance){
    balance -= amt;
    staked += amt;
    save();
    update();
  }
}

function unstake(){
  balance += staked;
  staked = 0;
  save();
  update();
}

function claimStake(){
  balance += stakeReward;
  stakeReward = 0;
  save();
  update();
}

// ================= LIVE CRYPTO API =================
async function loadPrices(){
  try{
    let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,binancecoin,tron&vs_currencies=usd");
    let data = await res.json();

    document.getElementById("btc").innerText = "$"+data.bitcoin.usd;
    document.getElementById("bnb").innerText = "$"+data.binancecoin.usd;
    document.getElementById("trx").innerText = "$"+data.tron.usd;
  }catch(e){
    console.log("API error");
  }
}
loadPrices();

// ================= SAVE =================
function save(){
  localStorage.setItem("balance", balance);
  localStorage.setItem("mineTime", timeLeft);
}

// ================= UPDATE =================
function update(){
  document.getElementById("balance").innerText = balance.toFixed(2);
  document.getElementById("staked").innerText = staked.toFixed(2);
  document.getElementById("reward").innerText = stakeReward.toFixed(4);
  document.getElementById("timer").innerText = formatTime(timeLeft);
}

function formatTime(sec){
  let h = Math.floor(sec/3600);
  let m = Math.floor((sec%3600)/60);
  let s = sec%60;
  return `${h}:${m}:${s}`;
}

// ================= LOOP =================
setInterval(()=>{

  if(mining && timeLeft > 0){
    timeLeft--;
  }

  if(staked > 0){
    stakeReward += staked * 0.00005;
  }

  update();

},1000);

update();

</script>

</body>
</html>
