<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
  color:#111;
  padding-bottom:80px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #eee;
}

.balance{
  font-size:28px;
  font-weight:bold;
}

.sub{
  font-size:12px;
  color:#888;
}

/* MENU ICON */
.menuBtn{
  font-size:24px;
  cursor:pointer;
}

/* POPUP MENU */
#menuBox{
  position:fixed;
  top:70px;
  right:15px;
  width:200px;
  background:#fff;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  padding:10px;

  opacity:0;
  transform:scale(0.9);
  pointer-events:none;
  transition:0.25s;
}

#menuBox.show{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

.menuItem{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.menuItem:hover{
  background:#f3f4f6;
}

/* ACTIONS */
.actions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:15px;
}

.action{
  background:#f6f7f9;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

/* MENU ROW */
.menuRow{
  display:flex;
  justify-content:space-around;
  padding:0 10px;
  font-weight:bold;
  font-size:13px;
  margin-bottom:5px;
}

/* TOKENS */
.card{
  margin:10px 15px;
  padding:10px 15px;
  border:1px solid #eee;
  border-radius:12px;
}

.token{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #f3f3f3;
  font-weight:bold;
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #eee;
  background:#fff;
}

.bottom div{
  text-align:center;
  font-size:14px;
  font-weight:500;
}

.bottom span{
  display:block;
  font-size:20px;
  margin-bottom:2px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">

  <div>
    <div class="balance" id="balance">$0.00</div>
    <div class="sub" id="walletStatus">Not Connected</div>
  </div>

  <div class="menuBtn" onclick="openMenu()">☰</div>

</div>

<!-- MENU -->
<div id="menuBox">
  <div class="menuItem" onclick="connectWallet()">🔗 Connect Wallet</div>
  <div class="menuItem" onclick="copyAddress()">📋 Copy Address</div>
  <div class="menuItem">⚙️ Settings</div>
  <div class="menuItem" onclick="closeMenu()">❌ Close</div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <div class="action">🟢 Buy</div>
  <div class="action">🔁 Swap</div>
  <div class="action">📤 Send</div>
  <div class="action">📥 Receive</div>
</div>

<!-- MENU TEXT ROW -->
<div class="menuRow">
  <div>📊 Tokens</div>
  <div>⛏️ Mining</div>
  <div>📈 Staking</div>
</div>

<!-- TOKENS -->
<div class="card">
  <div class="token"><span>₿ BTC</span><span>0.00</span></div>
  <div class="token"><span>🟡 BNB</span><span>0.00</span></div>
  <div class="token"><span>🪙 ALF</span><span>0.00</span></div>
  <div class="token"><span>💵 USDT</span><span>0.00</span></div>
  <div class="token"><span>🌐 TRX</span><span>0.00</span></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div><span>🏠</span>Home</div>
  <div><span>🔍</span>Explore</div>
  <div><span>💱</span>Trade</div>
  <div><span>📊</span>Activity</div>
  <div><span>🎁</span>Referral</div>
</div>

<script>

/* MENU */
function openMenu(){
  document.getElementById("menuBox").classList.add("show");
}
function closeMenu(){
  document.getElementById("menuBox").classList.remove("show");
}

document.addEventListener("click", function(e){
  let menu = document.getElementById("menuBox");
  let btn = document.querySelector(".menuBtn");

  if(!menu.contains(e.target) && !btn.contains(e.target)){
    closeMenu();
  }
});

/* WALLET */
let walletAddress = "";

async function connectWallet(){
  if(typeof window.ethereum !== "undefined"){
    const accounts = await window.ethereum.request({
      method:"eth_requestAccounts"
    });

    walletAddress = accounts[0];

    let short = walletAddress.slice(0,6)+"..."+walletAddress.slice(-4);
    document.getElementById("walletStatus").innerText = short;

    getBalance();
  }else{
    alert("Install MetaMask");
  }
}

async function getBalance(){
  const balance = await ethereum.request({
    method:"eth_getBalance",
    params:[walletAddress,"latest"]
  });

  let bnb = parseInt(balance,16)/1e18;
  document.getElementById("balance").innerText = "$"+(bnb*600).toFixed(2);
}

/* COPY ADDRESS */
function copyAddress(){
  if(walletAddress){
    navigator.clipboard.writeText(walletAddress);
    alert("Address copied");
  }else{
    alert("Connect wallet first");
  }
}

</script>

</body>
</html>
