<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet Pro</title>

<style>
:root{
  --bg:#ffffff;
  --text:#111;
  --card:#f2f4f7;
  --section:#ffffff;
  --border:#eee;
  --primary:#4f6ef7;
}

.dark{
  --bg:#0c0f14;
  --text:#ffffff;
  --card:#1a1f2b;
  --section:#11151c;
  --border:#222;
  --primary:#1f6feb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header{padding:20px;}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.balance{font-size:34px;font-weight:bold;}
.change{color:#16c784;}

/* HAMBURGER */
.menu-btn{
  width:25px;
  cursor:pointer;
}
.bar{
  height:3px;
  background:var(--text);
  margin:4px 0;
  border-radius:2px;
}

/* MENU */
#menu{
  position:fixed;
  top:0;
  right:-260px;
  width:260px;
  height:100%;
  background:var(--section);
  color:var(--text);
  transition:0.3s;
  padding:20px;
  z-index:1000;
  box-shadow:-5px 0 15px rgba(0,0,0,0.3);
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

/* CHART */
canvas{margin-top:10px;}

/* ACTIONS */
.actions{
  display:flex;
  justify-content:space-between;
  margin:15px;
}

.card{
  background:var(--card);
  padding:12px;
  border-radius:12px;
  text-align:center;
  width:70px;
}

/* SECTION */
.section{
  background:var(--section);
  margin:10px;
  padding:10px;
  border-radius:12px;
}

/* TOKEN */
.token{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid var(--border);
}

/* BUTTON */
button{
  background:var(--primary);
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  margin:4px 0;
  width:100%;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:var(--bg);
  border-top:1px solid var(--border);
}

/* FLOAT */
.float{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  background:var(--primary);
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div id="menu">
  <h3>Menu</h3>
  <button onclick="showChart()">📊 Open Chart</button>
  <button onclick="goStake()">💰 Staking</button>
  <button onclick="goReferral()">🎁 Referral</button>
  <button onclick="connectBNB()">🔗 Connect BNB</button>
  <button onclick="connectTRON()">🔗 Connect TRON</button>
  <button onclick="closeMenu()">❌ Close</button>
</div>

<!-- HEADER -->
<div class="header">

  <div class="topbar">
    <div>
      <div class="balance">$<span id="usd">0</span></div>
      <div class="change">+2.45%</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;">
      <button onclick="toggleTheme()" style="width:auto;">🌙</button>

      <!-- HAMBURGER -->
      <div class="menu-btn" onclick="openMenu()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </div>

  <!-- CHART (HIDDEN) -->
  <canvas id="chart" height="60" style="display:none;"></canvas>

</div>

<!-- ACTIONS -->
<div class="actions">
  <div class="card" onclick="buy()">💰<br><small>Buy</small></div>
  <div class="card" onclick="swap()">🔄<br><small>Swap</small></div>
  <div class="card" onclick="send()">📤<br><small>Send</small></div>
  <div class="card" onclick="receive()">📥<br><small>Receive</small></div>
</div>

<!-- TOKENS -->
<div class="section">
  <div class="token"><div>BNB</div><div id="bnbBal"></div></div>
  <div class="token"><div>ALF</div><div id="alfBal"></div></div>
  <div class="token"><div>TRX</div><div id="trxBal"></div></div>
</div>

<!-- STAKE (HIDDEN) -->
<div class="section" id="stakeSection" style="display:none;">
  <h3>Stake ALF</h3>
  <p>Staked: <span id="staked">0</span></p>
  <p>Reward: <span id="reward">0</span></p>
  <input id="stakeInput" type="number">
  <button onclick="stake()">Stake</button>
  <button onclick="unstake()">Unstake</button>
  <button onclick="claim()">Claim</button>
</div>

<!-- REFERRAL (HIDDEN) -->
<div class="section" id="refSection" style="display:none;">
  <h3>Referral</h3>
  <button onclick="invite()">Invite Friend (+50 ALF)</button>
</div>

<div class="float">+</div>

<div class="nav">
  <div>🏠</div>
  <div>🔍</div>
  <div onclick="showChart()">📊</div>
  <div>🕒</div>
  <div>🎁</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// THEME
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark")?"dark":"light");
}
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

// MENU
function openMenu(){
  document.getElementById("menu").style.right="0";
  document.getElementById("overlay").style.display="block";
}
function closeMenu(){
  document.getElementById("menu").style.right="-260px";
  document.getElementById("overlay").style.display="none";
}

// SHOW FEATURES
function showChart(){
  document.getElementById("chart").style.display="block";
  closeMenu();
}
function goStake(){
  let s=document.getElementById("stakeSection");
  s.style.display="block";
  s.scrollIntoView({behavior:"smooth"});
  closeMenu();
}
function goReferral(){
  let r=document.getElementById("refSection");
  r.style.display="block";
  r.scrollIntoView({behavior:"smooth"});
  closeMenu();
}

// DATA
let alf=100,bnb=0.005,trx=20,staked=0,reward=0;
let prices={BNB:600,TRX:0.06,ALF:0.1};

// CHART
const ctx=document.getElementById('chart').getContext('2d');
let chart=new Chart(ctx,{
  type:'line',
  data:{labels:[1,2,3,4,5,6,7],
    datasets:[{data:[10,12,11,15,14,18,20],borderColor:"#4f6ef7",tension:0.4}]
  },
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});

// UPDATE
function updateUI(){
  document.getElementById("alfBal").innerText=alf.toFixed(2)+" ALF";
  document.getElementById("bnbBal").innerText=bnb.toFixed(5)+" BNB";
  document.getElementById("trxBal").innerText=trx.toFixed(2)+" TRX";
  document.getElementById("staked").innerText=staked;
  document.getElementById("reward").innerText=reward.toFixed(4);

  let usd=(alf*prices.ALF)+(bnb*prices.BNB)+(trx*prices.TRX);
  document.getElementById("usd").innerText=usd.toFixed(2);
}

// LIVE
setInterval(()=>{
  prices.BNB+=(Math.random()-0.5)*10;
  prices.TRX+=(Math.random()-0.5)*0.01;

  let last=chart.data.datasets[0].data.slice(-1)[0];
  chart.data.datasets[0].data.push(last+(Math.random()-0.5)*2);
  chart.data.datasets[0].data.shift();
  chart.update();

  if(staked>0) reward+=staked*0.001;

  updateUI();
},2000);

updateUI();
</script>

</body>
</html>
