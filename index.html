<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Wallet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
  color:#111;
  padding-bottom:90px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #eee;
}

.balance{
  font-size:28px;
  font-weight:bold;
}

.sub{
  font-size:12px;
  color:#888;
}

.menuBtn{
  font-size:24px;
}

/* ACTIONS */
.actions{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:15px;
}

.action{
  background:#f6f7f9;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

/* CARD */
.card{
  margin:10px 15px;
  padding:10px 15px;
  border:1px solid #eee;
  border-radius:12px;
}

/* TASK */
.task{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.task button{
  background:#4f6ef7;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:6px;
}

/* BOTTOM */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #eee;
  background:#fff;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="top">
  <div>
    <div class="balance" id="balance">$0.00</div>
    <div class="sub" id="walletStatus">Not Connected</div>
  </div>
  <div class="menuBtn">☰</div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <div class="action">🟢 Buy</div>
  <div class="action">🔁 Swap</div>
  <div class="action">📤 Send</div>
  <div class="action">📥 Receive</div>
</div>

<!-- TOKENS -->
<div class="card">
  <h3>📊 Tokens</h3>
  <p>₿ BTC 0.00</p>
  <p>🟡 BNB 0.00</p>
  <p>🪙 ALF 0.00</p>
  <p>💵 USDT 0.00</p>
  <p>🌐 TRX 0.00</p>
</div>

<!-- MINING / STAKING -->
<div class="card">
  <h3>⛏️ Mining</h3>
  <p>Coming soon...</p>
</div>

<div class="card">
  <h3>📈 Staking</h3>
  <p>Earn rewards soon...</p>
</div>

<!-- REFERRAL + BONUS (NEW) -->
<div class="actions">
  <div class="action" onclick="copyReferral()">🎁 Copy Referral</div>
  <div class="action" onclick="claimBonus()">⚡ Bonus</div>
</div>

<!-- SOCIAL (NEW) -->
<div class="card">
  <h3>🌐 Social Links</h3>

  <div class="task">
    <span>Telegram</span>
    <button onclick="window.open('https://t.me/yourchannel')">Open</button>
  </div>

  <div class="task">
    <span>Twitter</span>
    <button onclick="window.open('https://twitter.com/yourpage')">Open</button>
  </div>

  <div class="task">
    <span>YouTube</span>
    <button onclick="window.open('https://youtube.com/@yourchannel')">Open</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div>🏠 Home</div>
  <div>🔍 Explore</div>
  <div>💱 Trade</div>
  <div>📊 Activity</div>
  <div>🎁 Referral</div>
</div>

<script>

let walletAddress = "";
let alfBalance = 0;

/* BONUS */
function claimBonus(){
  alfBalance += 5;
  document.getElementById("balance").innerText = "$"+alfBalance.toFixed(2);
  alert("🎉 Bonus +5 ALF");
}

/* REFERRAL */
function copyReferral(){
  let link = window.location.href + "?ref=" + (walletAddress || "guest");
  navigator.clipboard.writeText(link);
  alert("Referral link copied!");
}

</script>

</body>
</html>
