<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALF Exchange FIX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#fff;color:#111}

.top{
padding:15px;
background:#111;
color:#fff;
display:flex;
justify-content:space-between;
}

.container{padding:10px}

.box{
background:#f3f3f3;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

.btn{
padding:10px;
background:#ddd;
margin-top:8px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
font-size:12px;
}
</style>
</head>

<body>

<div class="top">
<div>💎 ALF Exchange</div>
<div id="addr">Not Connected</div>
</div>

<div class="container">

<div class="box">
<h3>Wallet</h3>
<div class="btn" onclick="connect()">Connect Wallet</div>
<h4>Balance: <span id="bal">0</span> ALF</h4>
</div>

<div class="box">
<h3>🔁 Swap</h3>
<input id="swapAmt" placeholder="Amount ALF">
<div class="btn" onclick="swap()">Swap ALF ↔ BNB</div>
</div>

<div class="box">
<h3>📊 Order Book</h3>

<input id="price" placeholder="Price">
<input id="amount" placeholder="Amount">

<div class="btn" onclick="addOrder('BUY')">Buy Order</div>
<div class="btn" onclick="addOrder('SELL')">Sell Order</div>

<table>
<tr>
<th>Type</th>
<th>Price</th>
<th>Amount</th>
</tr>
<tbody id="orders"></tbody>
</table>

</div>

</div>

<script>

const TOKEN = "0xD42B0217bb40E53800384f624b62Dd7F8465d766";

let provider, signer, user, contract;

const abi = [
"function balanceOf(address) view returns(uint256)",
"function decimals() view returns(uint8)"
];<script>

// 🔥 FORCE BNB CHAIN
async function switchToBNB(){
try{
await window.ethereum.request({
method: 'wallet_switchEthereumChain',
params: [{ chainId: '0x38' }]
});
}catch(e){
console.log("Switch error:", e);
}
}

// 🔥 CONNECT
async function connect(){

if(!window.ethereum){
alert("Install MetaMask!");
return;
}

try{

await switchToBNB();

const accounts = await window.ethereum.request({
method: "eth_requestAccounts"
});

if(accounts.length === 0){
alert("No account");
return;
}

provider = new ethers.providers.Web3Provider(window.ethereum);
signer = provider.getSigner();
user = accounts[0];

document.getElementById("addr").innerText =
user.slice(0,6)+"..."+user.slice(-4);

contract = new ethers.Contract(TOKEN, abi, signer);

await loadBalance();

alert("Connected ✅");

}catch(e){
console.log(e);
alert("Connection failed ❌");
}

}

// 🔥 BALANCE
async function loadBalance(){
try{
let bal = await contract.balanceOf(user);
let decimals = await contract.decimals();

document.getElementById("bal").innerText =
ethers.utils.formatUnits(bal, decimals);
}catch(e){
console.log(e);
}
}

// 🔁 SWAP
function swap(){
alert("Swap coming soon 🔁");
}

// 📊 ORDER BOOK
function addOrder(type){

let price = document.getElementById("price").value;
let amount = document.getElementById("amount").value;

if(!price || !amount){
alert("Weka price na amount");
return;
}

let row = `
<tr>
<td>${type}</td>
<td>${price}</td>
<td>${amount}</td>
</tr>
`;

document.getElementById("orders").innerHTML += row;
}

// 🔥 AUTO CONNECT
window.onload = async () => {
if(window.ethereum){
try{
const acc = await window.ethereum.request({
method:"eth_accounts"
});
if(acc.length > 0){
connect();
}
}catch(e){}
}
};

</script>
